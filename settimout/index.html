<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Simulation UI</title>
<style>
    body {
        background: #0f172a;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #fff;
    }

    .download-card {
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .file-name {
        font-size: 16px;
        margin-bottom: 10px;
        opacity: 0.9;
    }

    .progress-container {
        width: 100%;
        height: 10px;
        background: #334155;
        border-radius: 10px;
        overflow: hidden;
        margin: 15px 0;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #38bdf8, #6366f1);
        border-radius: 10px;
        animation: loading 5s linear forwards;
    }

    /* @keyframes loading {
        from { width: 0%; }
        to { width: 100%; }
    } */

    .status {
        font-size: 14px;
        opacity: 0.8;
    }

    .percentage {
        float: right;
    }

    .done {
        display: none;
        text-align: center;
        margin-top: 15px;
        color: #22c55e;
        font-weight: bold;
        /* animation: showDone 5s forwards; */
    }

    @keyframes showDone {
        0% { opacity: 0; }
        90% { opacity: 0; }
        100% { opacity: 1; }
    }
</style>
</head>
<body>

<div class="download-card">
    <div class="file-name">Downloading: file.zip</div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="status">
        Downloading...
        <span class="percentage">100%</span>
    </div>

    <div class="done">Download Complete ✔</div>
</div>
<script src="script.js"></script>
</body>
</html>
